<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Sistema MeuOrc</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/athusluz/MeuOrc/1ea1646f5b65dfc9438dc60321b08d4619c21716/MEUORC.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            /* Esta cor vai ficar no fundo, atrás da Ilha Dinâmica. 
               Deixei a cor do modo noturno do seu app. Se você usa mais o claro, mude para #f8fafc */
            background-color: #0f172a; 
        }
        .iframe-container {
            position: absolute;
            /* A MÁGICA: Empurra o topo na medida exata da Ilha Dinâmica / Notch */
            top: env(safe-area-inset-top);
            left: env(safe-area-inset-left);
            right: env(safe-area-inset-right);
            /* Mantemos o bottom zerado porque o seu app já gerencia o safe-area da barra inferior */
            bottom: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzV4usLh3RRx1rj8STkZyKdsyAftaWgE4GlCHtx8VOi-vJPJmgI58IxCa84u8Szyf1psQ/exec" allowfullscreen></iframe>
    </div>
</body>
</html>
