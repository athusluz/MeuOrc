<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Sistema MeuOrc</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/athusluz/MeuOrc/1ea1646f5b65dfc9438dc60321b08d4619c21716/MEUORC.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #0f172a;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            /* Ajuste cirúrgico: a faixa atual do Google tem 28px */
            top: -28px; 
            left: 0;
            width: 100%;
            height: calc(100% + 28px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzV4usLh3RRx1rj8STkZyKdsyAftaWgE4GlCHtx8VOi-vJPJmgI58IxCa84u8Szyf1psQ/exec" allowfullscreen></iframe>
    </div>
</body>
</html>
