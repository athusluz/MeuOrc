<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <title>MeuOrc</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/athusluz/MeuOrc/1ea1646f5b65dfc9438dc60321b08d4619c21716/MEUORC.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/athusluz/MeuPainelMusical/refs/heads/main/7fdbeeba-7654-4d85-86d1-99a20a934d96-wm.ico">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            /* Cor de fundo base para o modo Claro */
            background-color: #f8fafc; 
            transition: background-color 0.3s ease;
        }

        /* Detecta automaticamente o modo escuro do sistema (iPhone/Android) */
        @media (prefers-color-scheme: dark) {
            body, html {
                /* Cor de fundo base para o modo Escuro (mesma cor nativa do seu app) */
                background-color: #0f172a; 
            }
        }

        .iframe-container {
            position: absolute;
            /* Empurra o iframe levemente para baixo da ilha dinâmica/notch, 
               deixando a cor do body preencher perfeitamente a área superior! */
            top: env(safe-area-inset-top);
            left: env(safe-area-inset-left);
            right: env(safe-area-inset-right);
            bottom: 0;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzUCFNWQW5T98DBVjhhVbmiFM031RCJTKwZ-9FfU9KfdRiGVCOFM9iunnicfaAwF-R-bg/exec" allowfullscreen></iframe>
    </div>
</body>
</html>
