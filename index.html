<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Sistema MeuOrc</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/athusluz/MeuOrc/1ea1646f5b65dfc9438dc60321b08d4619c21716/MEUORC.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Evita barra de rolagem dupla */
            background-color: #0f172a; /* Cor de fundo escura do seu tema para evitar flashes em branco */
        }
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            /* Aqui acontece a mágica: movemos o iframe para cima para esconder a faixa do Google */
            top: -46px; 
            left: 0;
            width: 100%;
            height: calc(100% + 46px); /* Compensamos a altura para não faltar espaço embaixo */
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbw_px2oqVJfjq9tslDhqVNdlXQykChpEVdbhetkH7tL9EjaFnXL_H6PyIDRCmtCFNe06Q/exec" allowfullscreen></iframe>
    </div>
</body>
</html>
